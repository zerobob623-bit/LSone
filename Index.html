<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSONE COPILOT — A IA que conversa com você</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0806;
    --bg-soft: #120e0a;
    --bg-card: #16110c;
    --orange: #ff9142;
    --orange-deep: #ff6a1a;
    --orange-dim: rgba(255,145,66,0.35);
    --coral: #e8927c;
    --cream: #f4ebdc;
    --muted: #a89a89;
    --muted-dim: #6f6558;
    --line: rgba(255,145,66,0.18);
    --serif: 'Fraunces', serif;
    --sans: 'Manrope', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html{ scroll-behavior:smooth; }

  body{
    background: var(--bg);
    color: var(--cream);
    font-family: var(--sans);
    overflow-x:hidden;
    line-height:1.5;
  }

  a{ color:inherit; text-decoration:none; }

  ::selection{ background: var(--orange); color:#1a1006; }

  /* focus visibility */
  a:focus-visible, button:focus-visible{
    outline: 2px solid var(--orange);
    outline-offset: 4px;
  }

  #bg-canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:0;
    opacity:0.55;
    pointer-events:none;
  }

  .wrap{
    position:relative;
    z-index:1;
    max-width:1180px;
    margin:0 auto;
    padding:0 32px;
  }

  /* ---------- NAV ---------- */
  nav{
    position:relative;
    z-index:5;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:28px 32px;
    max-width:1180px;
    margin:0 auto;
  }
  .brand{
    font-family: var(--serif);
    font-size:19px;
    letter-spacing:0.02em;
    font-weight:500;
    color:var(--cream);
    display:flex;
    align-items:center;
    gap:10px;
  }
  .brand .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--orange);
    box-shadow:0 0 12px 3px var(--orange-dim);
  }
  .nav-cta{
    font-family: var(--mono);
    font-size:12px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--muted);
    border:1px solid var(--line);
    padding:9px 18px;
    border-radius:100px;
    transition: all .25s ease;
    white-space:nowrap;
  }
  .nav-cta:hover{ color:var(--orange); border-color:var(--orange-dim); }

  /* ---------- WELCOME VIDEO ---------- */
  .video-welcome{
    position:relative;
    z-index:2;
    max-width:760px;
    margin:0 auto;
    padding:8px 32px 0;
    text-align:center;
  }
  .video-welcome .section-eyebrow{
    justify-content:center;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .video-welcome .section-eyebrow .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--orange);
    box-shadow:0 0 10px 2px var(--orange-dim);
  }
  .video-frame{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    border-radius:20px;
    overflow:hidden;
    border:1px solid var(--line);
    box-shadow: 0 20px 60px -20px rgba(255,106,26,0.25);
    background:var(--bg-card);
  }
  .video-frame iframe{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    border:0;
  }
  .video-caption{
    margin-top:16px;
    font-family:var(--mono);
    font-size:12px;
    color:var(--muted-dim);
    letter-spacing:0.02em;
  }

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:60px 32px 80px;
  }
  .orb-stage{
    position:relative;
    width:min(460px, 82vw);
    aspect-ratio:1/1;
    margin-bottom:18px;
  }
  .orb-glow{
    position:absolute;
    inset:-18%;
    border-radius:50%;
    background: radial-gradient(circle at 50% 50%, rgba(255,145,66,0.35), rgba(255,106,26,0.08) 45%, transparent 70%);
    filter: blur(6px);
    animation: breathe 5.5s ease-in-out infinite;
  }
  .orb-img{
    position:relative;
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    display:block;
    will-change: transform;
    transition: transform .3s ease-out;
  }
  @keyframes breathe{
    0%,100%{ transform:scale(1); opacity:0.75; }
    50%{ transform:scale(1.08); opacity:1; }
  }

  .eyebrow{
    font-family: var(--mono);
    font-size:12px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--coral);
    margin-bottom:22px;
  }

  h1{
    font-family: var(--serif);
    font-weight:400;
    font-size: clamp(34px, 6vw, 68px);
    line-height:1.08;
    letter-spacing:-0.01em;
    max-width:900px;
    color:var(--cream);
  }
  h1 em{
    font-style:italic;
    font-weight:500;
    color:var(--orange);
  }

  .hero-sub{
    max-width:560px;
    margin:26px auto 40px;
    font-size:17px;
    color:var(--muted);
    font-weight:400;
  }

  .cta-btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    background: linear-gradient(135deg, var(--orange), var(--orange-deep));
    color:#170e05;
    font-weight:700;
    font-size:15px;
    padding:17px 34px;
    border-radius:100px;
    box-shadow: 0 8px 30px -6px rgba(255,106,26,0.55);
    transition: transform .25s ease, box-shadow .25s ease;
  }
  .cta-btn:hover{
    transform: translateY(-2px);
    box-shadow: 0 12px 36px -6px rgba(255,106,26,0.7);
  }
  .cta-btn .arrow{ transition: transform .25s ease; }
  .cta-btn:hover .arrow{ transform: translateX(3px); }

  .cta-note{
    margin-top:16px;
    font-family: var(--mono);
    font-size:11.5px;
    letter-spacing:0.04em;
    color:var(--muted-dim);
  }

  .scroll-hint{
    position:absolute;
    bottom:34px;
    left:50%;
    transform:translateX(-50%);
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--muted-dim);
    opacity:0.7;
  }

  /* ---------- SECTION GENERIC ---------- */
  section{
    position:relative;
    z-index:1;
    padding:120px 0;
  }
  .section-head{
    max-width:640px;
    margin-bottom:64px;
  }
  .section-eyebrow{
    font-family: var(--mono);
    font-size:12px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--coral);
    margin-bottom:18px;
  }
  h2{
    font-family: var(--serif);
    font-weight:400;
    font-size: clamp(28px, 4vw, 44px);
    line-height:1.15;
    color:var(--cream);
  }
  h2 em{ font-style:italic; color:var(--orange); font-weight:500; }
  .section-body-text{
    margin-top:20px;
    color:var(--muted);
    font-size:16px;
    max-width:520px;
  }

  .reveal{
    opacity:0;
    transform: translateY(28px);
    transition: opacity .8s ease, transform .8s ease;
  }
  .reveal.in{ opacity:1; transform:translateY(0); }

  /* ---------- WHISPER / CAPABILITIES ---------- */
  .whispers{
    display:flex;
    flex-direction:column;
    gap:20px;
    max-width:640px;
  }
  .whisper{
    display:flex;
    align-items:flex-start;
    gap:16px;
    padding:22px 26px;
    background: var(--bg-card);
    border:1px solid var(--line);
    border-radius:16px;
    transition: border-color .3s ease, transform .3s ease;
  }
  .whisper:hover{
    border-color: var(--orange-dim);
    transform: translateX(4px);
  }
  .whisper .spark{
    flex-shrink:0;
    width:7px; height:7px;
    margin-top:8px;
    border-radius:50%;
    background:var(--orange);
    box-shadow:0 0 10px 2px var(--orange-dim);
  }
  .whisper p{
    font-family: var(--mono);
    font-size:14.5px;
    color:var(--cream);
    line-height:1.6;
  }
  .whisper .who{
    display:block;
    margin-top:6px;
    font-size:11.5px;
    color:var(--muted-dim);
  }
  .whisper:nth-child(odd){ margin-left:0; }
  .whisper:nth-child(even){ margin-left:36px; }

  /* ---------- IDENTITY ---------- */
  .identity{
    display:grid;
    grid-template-columns: 0.9fr 1.1fr;
    gap:70px;
    align-items:center;
  }
  .mini-orb-stage{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    max-width:380px;
  }
  .mini-orb{
    position:absolute;
    inset:8%;
    border-radius:50%;
    background:
      radial-gradient(circle at 32% 28%, rgba(255,178,110,0.9), rgba(255,106,26,0.25) 35%, transparent 60%),
      radial-gradient(circle at 50% 50%, rgba(20,14,9,1), rgba(10,8,6,1) 70%);
    box-shadow:
      inset 0 0 60px rgba(255,106,26,0.25),
      0 0 90px 10px rgba(255,106,26,0.18);
    animation: breathe 6s ease-in-out infinite;
  }
  .mini-orb::before{
    content:'';
    position:absolute; inset:0;
    border-radius:50%;
    border:1px solid rgba(255,145,66,0.3);
  }
  #network-canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    border-radius:50%;
  }

  .identity-copy p{
    color:var(--muted);
    font-size:16px;
    margin-bottom:18px;
    max-width:480px;
  }
  .identity-copy strong{ color:var(--cream); font-weight:600; }

  /* ---------- REACTION ---------- */
  .reaction{
    text-align:center;
  }
  .reaction-frame{
    position:relative;
    max-width:620px;
    margin:0 auto 30px;
    border-radius:24px;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .reaction-frame img{
    width:100%;
    display:block;
  }
  .reaction-frame::after{
    content:'';
    position:absolute;
    inset:0;
    background: linear-gradient(180deg, transparent 55%, rgba(10,8,6,0.85) 100%);
  }
  .reaction-caption{
    font-family: var(--serif);
    font-style:italic;
    font-size: clamp(19px, 2.6vw, 26px);
    color:var(--cream);
    max-width:520px;
    margin:0 auto;
  }
  .reaction-caption span{ color:var(--orange); font-style:normal; font-weight:500; }

  /* ---------- LOCAL / PRESENCE ---------- */
  .presence-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:36px;
  }
  .presence-card{
    padding:8px 0 0;
    border-top:1px solid var(--line);
  }
  .presence-card .tag{
    font-family:var(--mono);
    font-size:11.5px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--coral);
    display:block;
    margin-bottom:14px;
  }
  .presence-card h3{
    font-family: var(--serif);
    font-weight:400;
    font-size:22px;
    color:var(--cream);
    margin-bottom:12px;
  }
  .presence-card p{
    color:var(--muted);
    font-size:15px;
  }

  /* ---------- FINAL CTA ---------- */
  .final-cta{
    text-align:center;
    padding-top:100px;
    padding-bottom:140px;
  }
  .final-orb-wrap{
    width:120px;
    height:120px;
    margin:0 auto 40px;
    position:relative;
  }
  .final-orb-wrap .mini-orb{ animation-duration: 4s; }
  .final-cta h2{
    max-width:680px;
    margin:0 auto;
  }
  .final-cta .hero-sub{ margin:22px auto 44px; }

  footer{
    position:relative;
    z-index:1;
    border-top:1px solid var(--line);
    padding:40px 32px;
  }
  .footer-inner{
    max-width:1180px;
    margin:0 auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:16px;
  }
  .footer-inner .brand{ font-size:15px; }
  .footer-note{
    font-family:var(--mono);
    font-size:11.5px;
    color:var(--muted-dim);
  }

  @media (max-width: 860px){
    .identity{ grid-template-columns:1fr; gap:44px; }
    .presence-grid{ grid-template-columns:1fr; gap:40px; }
    .whisper:nth-child(even){ margin-left:0; }
    section{ padding:88px 0; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
    html{ scroll-behavior:auto; }
  }
</style>
</head>
